<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match · resume tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Match</h1>
    </div>

    <div class="card">
      <label for="job">Job description</label>
      <textarea id="job" placeholder="Paste job description…"></textarea>

      <label style="margin-top: 1.4rem;">Resume</label>
      <div class="upload-area" id="dropZone">
        <span>↗ drop .txt or click</span>
      </div>
      <input type="file" id="resumeFile" accept=".txt">
      <span class="file-name empty" id="fileName">no file selected</span>
      <textarea id="resume" placeholder="Or paste resume text…"></textarea>

      <button onclick="analyzeResume()">Analyze</button>
    </div>

    <div class="card" id="result">
      <div class="score" id="score">0%</div>
      <div class="message" id="message"></div>
      <div class="progress"><div class="progress-fill" id="progressBar"></div></div>

      <div class="metric-grid">
        <div class="metric-item"><span class="metric-value" id="matchedCount">0</span><span class="metric-label">matched</span></div>
        <div class="metric-item"><span class="metric-value" id="missingCount">0</span><span class="metric-label">missing</span></div>
      </div>

      <div class="section"><h3>matched skills</h3><div class="skills" id="matchedSkills"></div></div>
      <div class="section"><h3>missing skills</h3><div class="skills" id="missingSkills"></div></div>

      <div class="section"><h3>improve</h3>
        <div class="improvements" id="improvements">
          <ul id="improvementList"><li><span>•</span> run analysis for insights</li></ul>
        </div>
      </div>
    </div>
  </div>

  <button class="dark-toggle" id="darkToggle" title="Toggle dark mode">◐</button>

  <script src="script.js"></script>
</body>
</html>
